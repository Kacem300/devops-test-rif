version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - odoo-net
    restart: unless-stopped

  odoo:
    image: odoo:17
    container_name: odoo_app
    depends_on:
      - db
    environment:
      HOST: db
      USER: ${POSTGRES_USER}
      PASSWORD: ${POSTGRES_PASSWORD}
      PORT: 5432
    volumes:
      - odoo-filestore:/var/lib/odoo
    ports:
      - "8069:8069"
    networks:
      - odoo-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: odoo_nginx
    ports:
      - "80:80"
    volumes:
      - ./apps/nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - odoo
    networks:
      - odoo-net
    restart: unless-stopped

networks:
  odoo-net:
    driver: bridge

volumes:
  postgres-data:
  odoo-filestore:
